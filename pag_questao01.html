<body>
    <h1> Faça um algoritmo que leia a largura e altura de uma
        parede, calcule e mostre a área a ser pintada e a
        quantidade de tinta necessária para o serviço. Considere
        que cada litro de tinta pinta uma área de 2metros
        quadrados.</h1>
    <p>Projeto criado para praticar git e github</p>
    
    
    <div id="div-form">
        <h3>quantidade de tinta </h3>

        <form id="formulario">
            <label for="largura">Largura</label>
            <input type="text" name="largura" id="largura">

            <label for="altura">Altura</label>
            <input type="text" name="altura" id="altura">


            <button type="submit">enviar</button>
            <button type="reset">limpar</button>

        </form>
        <div id="div-dados">

    </div>
</div>
